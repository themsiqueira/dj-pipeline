# Builds packaged Electron apps per OS and CPU arch. Each job runs fetch-tools on that runner so vendor/
# contains matching yt-dlp/ffmpeg binaries (see scripts/fetch-native-tools.mjs, VENDOR_ARCH).
name: Electron build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run electron:build:mac:arm64
      - uses: actions/upload-artifact@v4
        with:
          name: electron-dist-macos-arm64
          path: dist/
          if-no-files-found: error

  build-macos-x64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run electron:build:mac:x64
      - uses: actions/upload-artifact@v4
        with:
          name: electron-dist-macos-x64
          path: dist/
          if-no-files-found: error

  build-windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run electron:build:win
      - uses: actions/upload-artifact@v4
        with:
          name: electron-dist-windows-x64
          path: dist/
          if-no-files-found: error

  build-windows-arm64:
    runs-on: windows-11-arm
    env:
      VENDOR_ARCH: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run electron:build:win:arm64
      - uses: actions/upload-artifact@v4
        with:
          name: electron-dist-windows-arm64
          path: dist/
          if-no-files-found: error
