appId: com.youtubedj.pipeline
productName: YouTube DJ Pipeline
icon: build/icon.png
# Signing / notarization (macOS + Windows Authenticode): https://www.electron.build/code-signing
# CPU arch is chosen per build via CLI (--arm64 / --x64 / --win --arm64), not both at once,
# so vendor/ffmpeg matches the packaged binary (see scripts/fetch-native-tools.mjs + VENDOR_ARCH).
directories:
  output: dist
  buildResources: build
files:
  - src/**/*
  - electron/**/*
  - package.json
extraResources:
  - from: vendor
    to: vendor
    filter:
      - "**/*"
mac:
  category: public.app-category.music
  target:
    - dmg
    - zip
win:
  target:
    - nsis
    - zip
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  # Name shown in Settings > Apps > Installed apps (Windows 10/11)
  uninstallDisplayName: "YouTube DJ Pipeline"
  # Stable GUID helps Windows track the same product across upgrades/uninstalls
  guid: 8f3c2a1b-9d4e-5f6a-8b7c-0d1e2f3a4b5c
  createDesktopShortcut: always
  createStartMenuShortcut: true
  # Do not delete %APPDATA% app data on uninstall (user may want logs/settings)
  deleteAppDataOnUninstall: false
  include: build/installer.nsh
